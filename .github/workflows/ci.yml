name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run validation tests
        run: node tests/validate.js

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t alma-de-maria:latest .

      - name: Verify container starts
        run: |
          docker run -d --name test-container -p 8080:80 alma-de-maria:latest
          sleep 3
          curl -f http://localhost:8080 || exit 1
          docker stop test-container
